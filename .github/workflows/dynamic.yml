name: dynamic-integration

# Exercises the full sandbox path: build the image, install gVisor (runsc)
# on the runner, and run the dynamic-analysis integration test against a
# real container. Runs on PRs and pushes to main; scheduled weekly to catch
# breakage from Docker / gVisor / base-image drift.

on:
  push:
    branches: [main]
    paths:
      - "docker/**"
      - "src/clean_skill/dynamic_analysis/**"
      - "tests/integration/**"
      - "tests/fixtures/skills/dynamic_target/**"
      - ".github/workflows/dynamic.yml"
      - "pyproject.toml"
  pull_request:
    paths:
      - "docker/**"
      - "src/clean_skill/dynamic_analysis/**"
      - "tests/integration/**"
      - "tests/fixtures/skills/dynamic_target/**"
      - ".github/workflows/dynamic.yml"
      - "pyproject.toml"
  schedule:
    - cron: "17 6 * * 1"  # Monday 06:17 UTC

concurrency:
  group: dynamic-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sandbox:
    # gVisor requires Linux and supports amd64 / arm64; GHA ubuntu-latest
    # runners satisfy both.
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install clean-skill
        run: pip install -e ".[dev]"

      - name: Install gVisor (runsc)
        run: |
          set -euo pipefail
          ARCH=$(dpkg --print-architecture)
          curl -fsSL https://gvisor.dev/archive.key \
            | sudo gpg --dearmor -o /usr/share/keyrings/gvisor-archive-keyring.gpg
          echo "deb [arch=${ARCH} signed-by=/usr/share/keyrings/gvisor-archive-keyring.gpg] https://storage.googleapis.com/gvisor/releases release main" \
            | sudo tee /etc/apt/sources.list.d/gvisor.list > /dev/null
          sudo apt-get update
          sudo apt-get install -y runsc
          sudo runsc install
          sudo systemctl restart docker
          docker info --format '{{json .Runtimes}}' | jq '.'

      - name: Build sandbox image
        run: |
          docker build \
            -f docker/sandbox.Dockerfile \
            -t cleanskill/sandbox:latest \
            .

      - name: Run dynamic integration test under gVisor
        env:
          CLEAN_SKILL_RUN_INTEGRATION: "1"
          CLEAN_SKILL_SANDBOX_RUNTIME: "runsc"
          CLEAN_SKILL_SANDBOX_IMAGE: "cleanskill/sandbox:latest"
        run: pytest -v -m integration tests/integration

      - name: Upload sandbox logs on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: sandbox-logs
          path: |
            /tmp/clean-skill*.log
            /var/log/cleanskill/
          if-no-files-found: ignore
